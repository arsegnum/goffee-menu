<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Menù — Goffee</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}body{margin:0;}
/* Goffee — Menù · stile minimalista (Apple), multilingua.
   Versione production self-contained (nessuna dipendenza). */
.goffee-menu{
  --white:#FFFFFF;
  --ice:#FAFAFA;
  --ink:#1D1D1F;
  --muted:#6E6E73;
  --line:#E5E5E7;
  --accent:#D6452B;
  --bg:#FFFFFF;
  --font:-apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", "Helvetica Neue", Arial, sans-serif;
  --maxw:1120px;
  --pad:clamp(22px, 6vw, 64px);
  background:var(--white);color:var(--ink);
  font-family:var(--font);font-size:17px;line-height:1.6;font-weight:400;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  letter-spacing:-.01em;
}
.goffee-menu *{box-sizing:border-box;}
.goffee-menu strong{font-weight:600;}
.goffee-menu .page{min-height:100vh;}
.goffee-menu section[id], .goffee-menu header[id]{scroll-margin-top:64px;}

/* ---------- BANDS ---------- */
.goffee-menu .block{background:var(--white);}
.goffee-menu .block[data-tone="ice"]{background:var(--ice);}
.goffee-menu .block__inner{max-width:var(--maxw);margin:0 auto;padding:clamp(56px,9vw,112px) var(--pad);}

/* ---------- NAVBAR SITO (coerente con la home) ---------- */
.goffee-menu .snav{position:sticky;top:0;z-index:60;background:color-mix(in srgb, var(--white) 82%, transparent);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line);}
.goffee-menu .snav__bar{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;gap:24px;padding:0 var(--pad);height:64px;}
.goffee-menu .snav__brand{flex:none;display:flex;align-items:center;text-decoration:none;}
.goffee-menu .snav__brand img{height:32px;width:auto;display:block;}
.goffee-menu .snav__links{flex:1;display:flex;justify-content:flex-end;align-items:center;gap:36px;}
.goffee-menu .snav__link{text-decoration:none;white-space:nowrap;position:relative;font-size:.96rem;font-weight:400;color:var(--muted);letter-spacing:-.01em;padding:6px 0;transition:color .2s ease;}
.goffee-menu .snav__link:hover{color:var(--ink);}
.goffee-menu .snav__link--active{color:var(--ink);font-weight:500;}
.goffee-menu .snav__link--active::after{content:"";position:absolute;left:0;right:0;bottom:-3px;height:2px;border-radius:2px;background:var(--accent);}
.goffee-menu .snav__cta{display:inline-flex;align-items:center;justify-content:center;gap:9px;background:var(--accent);color:#fff;text-decoration:none;font-weight:500;font-size:.97rem;letter-spacing:-.005em;padding:12px 22px;border-radius:980px;white-space:nowrap;transition:filter .18s ease, transform .18s cubic-bezier(.2,.7,.3,1);}
.goffee-menu .snav__cta:hover{filter:brightness(1.06);transform:translateY(-1px);}
.goffee-menu .snav__cta svg{display:block;}
@media(max-width:680px){
  .goffee-menu .snav__bar{gap:12px;}
  .goffee-menu .snav__link{display:none;}
  .goffee-menu .snav__cta{padding:9px 16px;}
  .goffee-menu .snav__links{gap:14px;}
}

/* ---------- FLOATING NAV (pulsante lingua) ---------- */
.goffee-menu .fnav{position:fixed;right:clamp(16px,4vw,32px);bottom:clamp(16px,4vw,32px);z-index:70;}
.goffee-menu .fnav-backdrop{position:fixed;inset:0;z-index:69;background:rgba(20,12,8,.32);opacity:0;animation:goffeeFnavFade .2s ease forwards;}
@keyframes goffeeFnavFade{to{opacity:1;}}
.goffee-menu .fnav-fab{
  position:relative;z-index:71;display:inline-flex;align-items:center;gap:9px;
  background:var(--accent);color:#fff;border:none;cursor:pointer;font-family:var(--font);
  font-weight:500;font-size:.96rem;letter-spacing:-.005em;
  padding:13px 20px;border-radius:980px;
  box-shadow:0 12px 30px -10px color-mix(in srgb,var(--accent) 70%, #000);
  transition:transform .18s cubic-bezier(.2,.7,.3,1), filter .18s ease;
}
.goffee-menu .fnav-fab:hover{filter:brightness(1.06);transform:translateY(-2px);}
.goffee-menu .fnav-fab svg{display:block;}
.goffee-menu .fnav-sheet{
  position:absolute;right:0;bottom:calc(100% + 12px);z-index:71;width:min(78vw,288px);
  background:var(--white);border:1px solid var(--line);border-radius:18px;
  box-shadow:0 30px 60px -28px rgba(40,20,10,.5);
  padding:10px;transform-origin:bottom right;
  transform:scale(.92) translateY(8px);opacity:0;pointer-events:none;
  transition:transform .22s cubic-bezier(.2,.7,.3,1), opacity .18s ease;
}
.goffee-menu .fnav--open .fnav-sheet{transform:none;opacity:1;pointer-events:auto;}
.goffee-menu .fnav-backdrop{display:none;}
.goffee-menu .fnav--open .fnav-backdrop{display:block;}
.goffee-menu .fnav-sheet-head{display:flex;align-items:center;justify-content:space-between;padding:8px 10px 10px;}
.goffee-menu .fnav-sheet-head span{font-size:.76rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.goffee-menu .fnav-close{appearance:none;background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.3rem;line-height:1;padding:2px 6px;border-radius:8px;}
.goffee-menu .fnav-close:hover{color:var(--ink);background:color-mix(in srgb,var(--ink) 6%,transparent);}
.goffee-menu .fnav-list{display:flex;flex-direction:column;gap:2px;}
.goffee-menu .fnav-item{appearance:none;background:none;border:none;cursor:pointer;width:100%;text-align:left;font-family:var(--font);text-decoration:none;color:var(--ink);font-size:1.02rem;font-weight:400;letter-spacing:-.01em;padding:12px 14px;border-radius:11px;display:flex;align-items:center;gap:10px;transition:background .16s ease,color .16s ease;}
.goffee-menu .fnav-item:hover{background:color-mix(in srgb,var(--ink) 5%,transparent);}
.goffee-menu .fnav-item--active{color:var(--accent);font-weight:600;background:color-mix(in srgb,var(--accent) 8%,transparent);}
.goffee-menu .fnav-item--active::after{content:"";margin-left:auto;width:7px;height:7px;border-radius:50%;background:var(--accent);}

/* selettore lingua (legacy, non più montato ma mantenuto) */
.goffee-menu .lang{flex:none;display:flex;align-items:center;gap:2px;}
.goffee-menu .lang-btn{appearance:none;background:none;border:none;cursor:pointer;font-family:inherit;
  font-size:.86rem;font-weight:500;color:var(--muted);padding:5px 7px;border-radius:7px;
  letter-spacing:.02em;transition:color .18s ease, background .18s ease;}
.goffee-menu .lang-btn:hover{color:var(--ink);}
.goffee-menu .lang-btn--active{color:var(--accent);font-weight:600;}
.goffee-menu .lang-sep{color:var(--line);font-size:.8rem;user-select:none;}

/* ---------- BUTTON ---------- */
.goffee-menu .btn{
  display:inline-flex;align-items:center;gap:9px;
  background:var(--accent);color:#fff;text-decoration:none;
  font-family:var(--font);font-weight:500;font-size:1rem;letter-spacing:-.005em;
  padding:14px 28px;border-radius:980px;border:none;cursor:pointer;
  transition:transform .18s cubic-bezier(.2,.7,.3,1), filter .18s ease;
}
.goffee-menu .btn strong{font-weight:600;}
.goffee-menu .btn--big{font-size:1.05rem;padding:16px 32px;}
.goffee-menu .btn:hover{filter:brightness(1.06);}
.goffee-menu .btn:active{transform:scale(.985);}
.goffee-menu .btn--ghost{background:transparent;color:var(--ink);border:1px solid var(--line);}
.goffee-menu .btn--ghost:hover{filter:none;border-color:var(--ink);}
.goffee-menu .cta-row{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:center;}

/* ---------- FINESTRA "ORDINA" (scelta online / telefono) ---------- */
.goffee-menu .ord-modal{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.goffee-menu .ord-modal.ord-open{display:flex;}
.goffee-menu .ord-backdrop{position:absolute;inset:0;background:rgba(20,12,8,.45);animation:goffeeFnavFade .2s ease forwards;}
.goffee-menu .ord-card{position:relative;z-index:1;background:var(--white);border-radius:18px;padding:30px 24px 24px;width:min(92vw,360px);
  box-shadow:0 30px 70px -20px rgba(40,20,10,.5);text-align:center;
  transform:scale(.94);opacity:0;animation:goffeeOrdIn .22s cubic-bezier(.2,.7,.3,1) forwards;}
@keyframes goffeeOrdIn{to{transform:none;opacity:1;}}
.goffee-menu .ord-close{position:absolute;top:10px;right:12px;appearance:none;background:none;border:none;font-size:1.6rem;line-height:1;color:var(--muted);cursor:pointer;padding:2px 8px;border-radius:8px;}
.goffee-menu .ord-close:hover{color:var(--ink);background:color-mix(in srgb,var(--ink) 6%,transparent);}
.goffee-menu .ord-title{margin:0 0 18px;font-size:1.22rem;font-weight:600;color:var(--ink);letter-spacing:-.015em;}
.goffee-menu .ord-actions{display:flex;flex-direction:column;gap:10px;}
.goffee-menu .ord-actions .btn{width:100%;justify-content:center;}

/* ---------- HERO ---------- */
.goffee-menu .hero .block__inner{padding-top:clamp(72px,14vh,160px);padding-bottom:clamp(48px,8vw,88px);text-align:center;}
.goffee-menu .eyebrow{
  display:inline-block;font-size:.82rem;font-weight:600;
  letter-spacing:.14em;text-transform:uppercase;color:var(--accent);
}
.goffee-menu .hero-title{
  font-weight:700;font-size:clamp(4.4rem,16vw,9rem);line-height:.92;
  margin:.18em 0 .26em;letter-spacing:-.045em;color:var(--ink);
}
.goffee-menu .hero-sub{
  max-width:42ch;margin:0 auto 2.1em;color:var(--muted);
  font-size:clamp(1.16rem,2.7vw,1.45rem);line-height:1.5;font-weight:400;letter-spacing:-.015em;text-wrap:pretty;
}
.goffee-menu .hero[data-variant="foto"] .block__inner{display:grid;grid-template-columns:1.05fr .95fr;gap:clamp(28px,5vw,64px);align-items:center;text-align:left;}
.goffee-menu .hero[data-variant="foto"] .hero-sub{margin-left:0;}
.goffee-menu .hero-photo{
  align-self:stretch;min-height:340px;border-radius:18px;
  background:var(--ice);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
}
.goffee-menu .photo-tag{font-size:.78rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
/* hero con foto di sfondo */
.goffee-menu .hero[data-variant="sfondo"]{position:relative;overflow:hidden;background:#1d1d1f;}
.goffee-menu .hero[data-variant="sfondo"] .hero-bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 45%;display:block;}
.goffee-menu .hero[data-variant="sfondo"] .hero-scrim{position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg, rgba(16,12,10,.42) 0%, rgba(16,12,10,.52) 50%, rgba(16,12,10,.72) 100%);}
.goffee-menu .hero[data-variant="sfondo"] .block__inner{position:relative;z-index:2;text-align:center;min-height:clamp(440px,72vh,680px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:clamp(64px,10vw,104px);padding-bottom:clamp(56px,9vw,104px);}
.goffee-menu .hero[data-variant="sfondo"] .hero-copy{pointer-events:none;}
.goffee-menu .hero[data-variant="sfondo"] .hero-copy .btn{pointer-events:auto;}
.goffee-menu .hero[data-variant="sfondo"] .eyebrow{color:#fff;opacity:.92;text-shadow:0 1px 10px rgba(0,0,0,.35);}
.goffee-menu .hero[data-variant="sfondo"] .hero-title{color:#fff;text-shadow:0 2px 26px rgba(0,0,0,.38);}
.goffee-menu .hero[data-variant="sfondo"] .hero-sub{color:rgba(255,255,255,.90);text-shadow:0 1px 14px rgba(0,0,0,.34);}
.goffee-menu .hero[data-variant="sfondo"] .hero-copy .btn{background:#fff;color:#C0392B;box-shadow:0 12px 34px -12px rgba(0,0,0,.55);}
.goffee-menu .hero[data-variant="sfondo"] .hero-copy .btn:hover{background:#fff;filter:none;transform:translateY(-1.5px);box-shadow:0 18px 38px -14px rgba(0,0,0,.6);}
@media(max-width:760px){
  .goffee-menu .hero[data-variant="foto"] .block__inner{grid-template-columns:1fr;text-align:center;}
  .goffee-menu .hero[data-variant="foto"] .hero-sub{margin-left:auto;}
  .goffee-menu .hero[data-variant="foto"] .hero-photo{min-height:200px;order:-1;}
}

/* ---------- SECTION ---------- */
.goffee-menu .sec-head{margin-bottom:clamp(32px,4.5vw,52px);max-width:60ch;}
.goffee-menu .sec-kicker{display:block;font-size:.8rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;}
.goffee-menu .sec-title{font-weight:700;font-size:clamp(2.2rem,5.5vw,3.4rem);line-height:1.04;margin:0;color:var(--ink);letter-spacing:-.03em;}
.goffee-menu .sec-note{margin:18px 0 0;color:var(--muted);max-width:56ch;font-size:1.06rem;line-height:1.55;letter-spacing:-.01em;text-wrap:pretty;}

/* ---------- MENU GRID ---------- */
.goffee-menu .menu-grid{display:grid;grid-template-columns:1fr;gap:0;}
@media(min-width:760px){.goffee-menu .menu-grid{grid-template-columns:1fr 1fr;column-gap:clamp(40px,5vw,72px);}}

.goffee-menu .dish{transition:transform .2s cubic-bezier(.2,.7,.3,1);}
.goffee-menu .dish-head{display:flex;justify-content:space-between;align-items:baseline;gap:18px;}
.goffee-menu .dish-name{font-weight:600;font-size:1.08rem;margin:0;color:var(--ink);line-height:1.3;letter-spacing:-.015em;}
.goffee-menu .allerg{margin-left:5px;color:var(--muted);font-weight:400;position:relative;cursor:pointer;white-space:nowrap;}
.goffee-menu .allerg sup{font-size:.58em;margin:0 .5px;font-weight:500;transition:color .15s ease;}
.goffee-menu .allerg:hover sup, .goffee-menu .allerg--open sup{color:var(--accent);}
.goffee-menu .allerg:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px;}
.goffee-menu .fresh-mark{display:inline-flex;align-items:center;color:var(--accent);margin-left:5px;vertical-align:baseline;position:relative;top:1px;}
.goffee-menu .fresh-mark svg{display:block;}
.goffee-menu .allerg-pop{
  position:absolute;left:50%;bottom:calc(100% + 9px);transform:translateX(-50%) translateY(4px);
  background:var(--ink);color:#fff;font-size:.74rem;font-weight:500;line-height:1.35;letter-spacing:0;
  padding:7px 11px;border-radius:9px;white-space:normal;width:max-content;max-width:230px;text-align:center;
  box-shadow:0 10px 28px -10px rgba(0,0,0,.4);
  opacity:0;visibility:hidden;pointer-events:none;transition:opacity .16s ease, transform .16s ease;z-index:30;
}
.goffee-menu .allerg-pop::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:var(--ink);}
.goffee-menu .allerg:hover .allerg-pop, .goffee-menu .allerg--open .allerg-pop{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);}
.goffee-menu .price{color:var(--accent);font-weight:600;font-size:1.06rem;font-variant-numeric:tabular-nums;white-space:nowrap;flex:none;letter-spacing:-.02em;}
.goffee-menu .desc{margin:6px 0 0;color:var(--muted);font-size:.96rem;line-height:1.5;letter-spacing:-.01em;text-wrap:pretty;}

/* card variants */
.goffee-menu .page[data-card="carte"] .menu-grid{gap:16px;}
@media(min-width:760px){.goffee-menu .page[data-card="carte"] .menu-grid{gap:16px;}}
.goffee-menu .page[data-card="carte"] .dish{
  background:var(--white);border:1px solid var(--line);border-radius:12px;padding:20px 22px;
  box-shadow:0 1px 2px rgba(0,0,0,.02);
}
.goffee-menu .page[data-card="carte"] .dish:hover{transform:translateY(-2px);box-shadow:0 8px 24px -16px rgba(0,0,0,.18);}
.goffee-menu .page[data-card="carte"] .block[data-tone="ice"] .dish{box-shadow:0 1px 3px rgba(0,0,0,.03);}

.goffee-menu .page[data-card="linee"] .dish{padding:18px 0;border-bottom:1px solid var(--line);}

.goffee-menu .page[data-card="spaziate"] .menu-grid{row-gap:30px;column-gap:clamp(48px,6vw,88px);}
.goffee-menu .page[data-card="spaziate"] .dish{padding:0;}

/* ---------- DRINKS ---------- */
.goffee-menu .drinks{display:grid;grid-template-columns:1fr;gap:clamp(34px,5vw,60px);}
@media(min-width:760px){.goffee-menu .drinks{grid-template-columns:1fr 1fr;}}
.goffee-menu .drink-list{list-style:none;margin:0;padding:0;}
.goffee-menu .drink-list li{display:flex;align-items:baseline;gap:10px;padding:12px 0;border-bottom:1px solid var(--line);}
.goffee-menu .drink-name{color:var(--ink);font-weight:500;font-size:1.02rem;letter-spacing:-.01em;}
.goffee-menu .dotfill{flex:1;}
.goffee-menu .beer-title{font-weight:600;font-size:1.16rem;color:var(--ink);margin:0 0 12px;letter-spacing:-.02em;}
.goffee-menu .beer-title--craft{margin-top:28px;}

/* ---------- FASCIA "AL TAVOLO" (3 passi) ---------- */
.goffee-menu .dine-note{background:color-mix(in srgb, var(--accent) 5%, var(--white));border-bottom:1px solid var(--line);}
.goffee-menu .dine-note__in{max-width:var(--maxw);margin:0 auto;padding:clamp(16px,2.4vw,22px) var(--pad);text-align:center;}
.goffee-menu .dine-note__kicker{display:block;font-size:.72rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;}
.goffee-menu .dine-steps{display:flex;flex-wrap:wrap;gap:14px 34px;justify-content:center;align-items:center;}
.goffee-menu .dine-step{display:flex;align-items:center;gap:11px;text-align:left;}
.goffee-menu .dine-ic{position:relative;flex:none;width:36px;height:36px;border-radius:50%;
  background:color-mix(in srgb, var(--accent) 12%, var(--white));color:var(--accent);}
.goffee-menu .dine-ic svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:block;}
.goffee-menu .dine-step p{margin:0;line-height:1.3;}
.goffee-menu .dine-step b{display:block;font-weight:600;font-size:.94rem;color:var(--ink);letter-spacing:-.01em;}
.goffee-menu .dine-step span{display:block;font-size:.82rem;color:var(--muted);}
@media(max-width:720px){.goffee-menu .dine-steps{flex-direction:column;align-items:flex-start;gap:13px;max-width:340px;margin:0 auto;}}

/* ---------- AVVISO ALLERGENI IN ALTO ---------- */
.goffee-menu .allerg-top .block__inner{padding-top:0;padding-bottom:clamp(28px,4vw,40px);}
.goffee-menu .allerg-top p{margin:0 auto;padding-top:clamp(18px,3vw,24px);border-top:1px solid var(--line);font-size:.84rem;line-height:1.5;color:var(--muted);max-width:60ch;text-align:center;}
.goffee-menu .allerg-more{color:var(--accent);text-decoration:none;font-weight:500;border-bottom:1px solid color-mix(in srgb,var(--accent) 35%, transparent);white-space:nowrap;transition:border-color .18s ease;}
.goffee-menu .allerg-more:hover{border-bottom-color:var(--accent);}

/* ---------- NOTE LEGALI + LEGENDA ---------- */
.goffee-menu .note-box .block__inner{padding-top:clamp(40px,6vw,64px);padding-bottom:clamp(40px,6vw,64px);border-top:1px solid var(--line);}
.goffee-menu .note-box .allerg-intro{margin:0 0 18px;font-size:.78rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.goffee-menu .note-box .allerg-legend{list-style:none;margin:0 0 30px;padding:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px 24px;}
.goffee-menu .note-box .allerg-legend li{font-size:.86rem;color:var(--muted);display:flex;align-items:baseline;gap:7px;}
.goffee-menu .note-box .allerg-legend b{font-size:.78rem;font-weight:600;color:var(--ink);flex:none;min-width:16px;}
.goffee-menu .note-star{margin:0 0 20px;font-size:.8rem;color:var(--muted);line-height:1.5;}
.goffee-menu .note-fresh{display:flex;align-items:flex-start;gap:7px;margin:0 0 10px;padding-top:24px;border-top:1px solid var(--line);font-size:.8rem;color:var(--muted);line-height:1.5;}
.goffee-menu .note-fresh .fresh-mark{margin-left:0;top:2px;flex:none;}
.goffee-menu .note-prezzi{margin:0 0 10px;font-size:.8rem;color:var(--muted);line-height:1.5;}
.goffee-menu .note-cols{display:grid;grid-template-columns:1fr;gap:16px 40px;}
@media(min-width:760px){.goffee-menu .note-cols{grid-template-columns:repeat(3,1fr);}}
.goffee-menu .note-cols p{margin:0;font-size:.78rem;line-height:1.55;color:#8E8E93;letter-spacing:-.005em;text-wrap:pretty;}

/* ---------- FOOTER ---------- */
.goffee-menu .foot .block__inner{text-align:center;border-top:1px solid var(--line);}
.goffee-menu .foot-eyebrow{display:block;font-size:.8rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:18px;}
.goffee-menu .foot-logo{display:block;height:46px;width:auto;margin:0 auto 26px;}
.goffee-menu .foot-title{font-weight:700;font-size:clamp(2.4rem,7vw,3.8rem);margin:0 0 .3em;color:var(--ink);letter-spacing:-.035em;line-height:1;}

      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");

  // span allergeni con tooltip (numeri localizzati nel testo del popup)
  function allerg(list, names) {
    if (!list || !list.length) return "";
    var txt = list.map(function (x) { return names[x - 1]; }).filter(Boolean).join(", ");
    var sup = list.map(function (x, i) {
      return "<sup>" + x + (i < list.length - 1 ? "," : "") + "</sup>";
    }).join("");
    return '<span class="allerg" role="button" tabindex="0" aria-label="Allergeni: ' + esc(txt) + '">' +
      sup + '<span class="allerg-pop" role="tooltip">' + esc(txt) + '</span></span>';
  }

  function dish(item, lang, names) {
    var head =
      '<div class="dish-head"><h3 class="dish-name">' + esc(item.n) +
      (item.fresh ? FRESH_SVG : "") + allerg(item.a, names) + '</h3>' +
      '<span class="price">' + esc(item.p) + '</span></div>';
    var body = item.d ? '<p class="desc">' + esc(desc(item.n, item.d, lang)) + '</p>' : "";
    return '<article class="dish">' + head + body + '</article>';
  }

  function section(s, tone, lang, ui, names) {
    var title = (I18N.secTitoli[s.id] && I18N.secTitoli[s.id][lang]) || ui.nav[s.id] || s.titolo;
    var tr = (I18N.sezioni[s.id] && I18N.sezioni[s.id][lang]) || {};
    var kicker = lang === "it" ? s.kicker : (tr.kicker !== undefined ? tr.kicker : s.kicker);
    var nota = lang === "it" ? s.nota : (tr.nota !== undefined ? tr.nota : s.nota);
    var dishes = s.items.map(function (it) { return dish(it, lang, names); }).join("");
    return '<section class="block" data-tone="' + tone + '" id="' + s.id + '">' +
      '<div class="block__inner"><header class="sec-head">' +
      (kicker ? '<span class="sec-kicker">' + esc(kicker) + '</span>' : "") +
      '<h2 class="sec-title">' + esc(title) + '</h2>' +
      (nota ? '<p class="sec-note">' + esc(nota) + '</p>' : "") +
      '</header><div class="menu-grid">' + dishes + '</div></div></section>';
  }

  }

  function hero(variant, ui) {
    var bg = variant === "sfondo"
      ? '<img class="hero-bg-img" src="' + esc(CONFIG.heroBg) + '" alt=""><div class="hero-scrim"></div>' : "";
    var photo = variant === "foto"
      ? '<div class="hero-photo" role="img" aria-label="Foto pizza (placeholder)"><span class="photo-tag">foto pizza</span></div>' : "";
    return '<header class="block hero" data-variant="' + variant + '" id="top">' + bg +
      '<div class="block__inner"><div class="hero-copy">' +
      '<span class="eyebrow">' + esc(ui.heroPlace) + '</span>' +
      '<h1 class="hero-title">Menù</h1>' +
      '<p class="hero-sub">' + esc(ui.heroSub) + '</p>' +
      ctaRow(ui) + '</div>' + photo + '</div></header>';
  }

  // Navbar di sito (coerente con la home): Home / Menù / Dove siamo / Ordina ora
  function snav() {
    return '<header class="snav"><nav class="snav__bar" aria-label="Navigazione sito">' +
      '<a class="snav__brand" href="' + esc(CONFIG.homeUrl) + '" aria-label="Goffee Pizzeria — home"><img src="' + esc(CONFIG.logoSrc) + '" alt="Goffee Pizzeria"></a>' +
      '<div class="snav__links">' +
      '<a class="snav__link" href="' + esc(CONFIG.homeUrl) + '">Home</a>' +
      '<a class="snav__link snav__link--active" href="#top">Menù</a>' +
      '<a class="snav__link" href="' + esc(CONFIG.homeUrl) + '#contatti">Dove siamo</a>' +
      orderTrigger("snav__cta") +
      '</div></nav></header>';
  }

  // Pulsante lingua flottante (in basso a destra): globo + lingua, con elenco a comparsa.
  function fnav(lang) {
    var label = LANG_LABEL[lang] || "Lingua";
    var currentPair = I18N.langs.filter(function (p) { return p[0] === lang; })[0] || I18N.langs[0];
    var current = currentPair[1];
    var items = I18N.langs.map(function (pair) {
      var code = pair[0];
      return '<button type="button" class="fnav-item' + (lang === code ? " fnav-item--active" : "") +
        '" data-lang="' + code + '" aria-pressed="' + (lang === code) + '">' + esc(LANG_NAMES[code]) + '</button>';
    }).join("");
    return '<div class="fnav">' +
      '<div class="fnav-backdrop"></div>' +
      '<div class="fnav-sheet" role="dialog" aria-label="' + esc(label) + '">' +
      '<div class="fnav-sheet-head"><span>' + esc(label) + '</span><button type="button" class="fnav-close" aria-label="Chiudi">×</button></div>' +
      '<nav class="fnav-list">' + items + '</nav></div>' +
      '<button type="button" class="fnav-fab" aria-expanded="false" aria-label="' + esc(label) + '">' +
      GLOBE_SVG + '<span>' + esc(current) + '</span></button></div>';
  }

  function noteBox(ui, names) {
    var legend = MENU.allergeni.map(function (pair, i) {
      return '<li><b>' + pair[0] + '</b> ' + esc(names[i]) + '</li>';
    }).join("");
    return '<section class="block note-box" data-tone="white" id="note"><div class="block__inner">' +
      '<p class="allerg-intro">' + esc(ui.allergIntro) + '</p>' +
      '<ul class="allerg-legend">' + legend + '</ul>' +
      '<p class="note-fresh">' + FRESH_SVG + ' ' + esc(ui.freshNote) + '</p>' +
      '<p class="note-prezzi">' + esc(ui.notePrezzi) + '</p>' +
      '<p class="note-star">' + esc(ui.noteStar) + '</p>' +
      '<div class="note-cols"><p>' + esc(ui.note1) + '</p><p>' + esc(ui.note2) + '</p><p>' + esc(ui.note3) + '</p></div>' +
      '</div></section>';
  }

  function footer(ui) {
    return '<footer class="block foot" data-tone="ice" id="contatti"><div class="block__inner">' +
      '<span class="foot-eyebrow">' + esc(ui.footEyebrow) + '</span>' +
      '<h2 class="foot-title">' + esc(ui.footTitle) + '</h2>' +
      '<p class="foot-addr">' + esc(CONFIG.address) + '</p>' +
      '<div class="foot-hours">' +
      '<div><span>' + esc(ui.lunch) + '</span><b>' + esc(CONFIG.hours.lunch) + '</b></div>' +
      '<div><span>' + esc(ui.dinner) + '</span><b>' + esc(CONFIG.hours.dinner) + '</b></div>' +
      '<div><span>' + esc(ui.rest) + '</span><b>' + esc(ui.closed) + '</b></div></div>' +
      ctaRow(ui) + '</div>' +
      '<div class="foot-legal"><small>' + esc(CONFIG.legal) + '</small>' +
      '<div class="foot-social">' +
      '<a href="' + esc(CONFIG.instagram) + '" aria-label="Instagram">' + IG_SVG + '</a>' +
      '<a href="' + esc(CONFIG.facebook) + '" aria-label="Facebook">' + FB_SVG + '</a>' +
      '</div></div></footer>';
  }

  /* ----------------------------- STATO + RENDER --------------------------- */
  var root, currentLang;

  function readLang() {
    try {
      var saved = localStorage.getItem(CONFIG.storageKey);
      if (saved && I18N.ui[saved]) return saved;
      var navLang = (navigator.language || "it").slice(0, 2).toLowerCase();
      if (I18N.ui[navLang]) return navLang;
    } catch (e) {}
    return "it";
  }

  function render() {
    var ui = I18N.ui[currentLang];
    var names = ui.allergeni;
    var sez = MENU.sezioni;

    var sections = sez.map(function (s, i) {
      return section(s, i % 2 === 0 ? "white" : "ice", currentLang, ui, names);
    }).join("");
    var drinksTone = sez.length % 2 === 0 ? "white" : "ice";

    root.innerHTML =
      snav() +
      '<div class="page" data-card="' + CONFIG.card + '" style="--accent:' + CONFIG.accent + '">' +
      hero(CONFIG.hero, ui) +
      dineBand(ui) +
      '<div class="block allerg-top" data-tone="white"><div class="block__inner"><p>' +
      esc(ui.allergTop) + ' <a href="#note" class="allerg-more">' + esc(ui.allergMore) + '</a></p></div></div>' +
      sections +
      drinks(MENU.bibite, drinksTone, currentLang, ui, names) +
      noteBox(ui, names) +
      footer(ui) +
      '</div>' +
      fnav(currentLang) +
      orderModal(ui);

    wireAllergens();
    wireFnav();
    wireOrder();
  }

  // Finestra "Ordina": apertura dai pulsanti .order-trigger, chiusura da backdrop/×/scelta.
  function wireOrder() {
    var modal = root.querySelector(".ord-modal");
    if (!modal) return;
    function open() { modal.classList.add("ord-open"); }
    function close() { modal.classList.remove("ord-open"); }
    root.querySelectorAll(".order-trigger").forEach(function (b) {
      b.addEventListener("click", function (e) { e.preventDefault(); open(); });
    });
    var bd = modal.querySelector(".ord-backdrop"); if (bd) bd.addEventListener("click", close);
    var x = modal.querySelector(".ord-close"); if (x) x.addEventListener("click", close);
    modal.querySelectorAll(".ord-opt").forEach(function (a) { a.addEventListener("click", close); });
  }

  /* --------------------------- INTERAZIONI -------------------------------- */
  // Tooltip allergeni: hover (desktop) + tap/click & tastiera (mobile/a11y)
  function wireAllergens() {
    root.querySelectorAll(".allerg").forEach(function (el) {
      el.addEventListener("mouseenter", function () { el.classList.add("allerg--open"); });
      el.addEventListener("mouseleave", function () { el.classList.remove("allerg--open"); });
      el.addEventListener("click", function (e) {
        e.preventDefault();
        el.classList.toggle("allerg--open");
      });
      el.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          el.classList.toggle("allerg--open");
        }
      });
    });
  }

  function setLang(code) {
    if (!code || code === currentLang || !I18N.ui[code]) return;
    currentLang = code;
    try { localStorage.setItem(CONFIG.storageKey, code); } catch (e) {}
    document.documentElement.lang = code;
    render();
  }

  // Pulsante lingua flottante: apertura/chiusura foglio + scelta lingua.
  function wireFnav() {
    var fn = root.querySelector(".fnav");
    if (!fn) return;
    var fab = fn.querySelector(".fnav-fab");
    function close() { fn.classList.remove("fnav--open"); if (fab) fab.setAttribute("aria-expanded", "false"); }
    function open() { fn.classList.add("fnav--open"); if (fab) fab.setAttribute("aria-expanded", "true"); }
    if (fab) fab.addEventListener("click", function () {
      fn.classList.contains("fnav--open") ? close() : open();
    });
    var x = fn.querySelector(".fnav-close");
    if (x) x.addEventListener("click", close);
    var bd = fn.querySelector(".fnav-backdrop");
    if (bd) bd.addEventListener("click", close);
    fn.querySelectorAll(".fnav-item").forEach(function (btn) {
      btn.addEventListener("click", function () { setLang(btn.getAttribute("data-lang")); });
    });
  }

  /* --------------------- FOGLIO GOOGLE (opzionale) ------------------------ */
  // Parser CSV minimale ma robusto: gestisce campi tra virgolette, virgole e
  // a capo interni, e virgolette doppie raddoppiate ("").
  function parseCSV(text) {
    text = String(text).replace(/\r\n/g, "\n").replace(/\r/g, "\n");
    var rows = [], row = [], field = "", inQ = false, i, c;
    for (i = 0; i < text.length; i++) {
      c = text[i];
      if (inQ) {
        if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false; }
        else field += c;
      } else if (c === '"') { inQ = true; }
      else if (c === ",") { row.push(field); field = ""; }
      else if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
      else field += c;
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    var headers = (rows.shift() || []).map(function (h) { return h.trim().toLowerCase(); });
    return rows
      .filter(function (r) { return r.some(function (x) { return x.trim() !== ""; }); })
      .map(function (r) {
        var o = {};
        headers.forEach(function (h, idx) { o[h] = r[idx] !== undefined ? r[idx] : ""; });
        return o;
      });
  }

  // Trasforma le righe del foglio nella struttura MENU + traduzioni I18N.
  // Una sezione viene sostituita solo se nel foglio ha almeno una riga, così un
  // foglio incompleto non svuota mai il menù.
  function applySheet(rows) {
    var buckets = { classiche: [], speciali: [], margherita: [], pala: [], bibite: [], birre_std: [], birre_craft: [] };
    rows.forEach(function (r) {
      var s = (r.sezione || "").trim().toLowerCase();
      var nome = (r.nome || "").trim();
      if (!nome || !buckets[s]) return;
      var all = (r.allergeni || "").split(/[^0-9]+/).filter(Boolean).map(Number);
      var item = { n: nome, p: (r.prezzo || "").trim() };
      if (all.length) item.a = all;
      var dit = (r.desc_it || "").trim();
      if (dit) item.d = dit;
      if ((r.fresh || "").trim()) item.fresh = true;
      // traduzioni descrizione → I18N.desc (così desc() le usa come sempre)
      var tr = {};
      ["en", "de", "fr"].forEach(function (l) {
        var v = (r["desc_" + l] || "").trim();
        if (v) tr[l] = v;
      });
      if (Object.keys(tr).length) {
        I18N.desc[nome] = Object.assign({}, I18N.desc[nome], tr);
      }
      buckets[s].push(item);
    });
    MENU.sezioni.forEach(function (sec) {
      if (buckets[sec.id] && buckets[sec.id].length) sec.items = buckets[sec.id];
    });
    if (buckets.bibite.length) MENU.bibite.bibite = buckets.bibite;
    if (buckets.birre_std.length) MENU.bibite.birreStd.items = buckets.birre_std;
    if (buckets.birre_craft.length) MENU.bibite.birre.items = buckets.birre_craft;
  }

  function loadSheet() {
    if (!CONFIG.sheetCsvUrl) return;
    fetch(CONFIG.sheetCsvUrl, { cache: "no-store" })
      .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
      .then(function (txt) { applySheet(parseCSV(txt)); render(); })
      .catch(function (e) { console.warn("[Goffee] Foglio non caricato, uso i dati interni:", e); });
  }

  /* ------------------------------ INIT ------------------------------------ */
  function init() {
    root = document.querySelector(CONFIG.mount);
    if (!root) {
      console.error("[Goffee] contenitore non trovato:", CONFIG.mount);
      return;
    }
    var d = root.dataset || {};
    if (d.homeUrl) CONFIG.homeUrl = d.homeUrl;
    if (d.orderUrl) CONFIG.orderUrl = d.orderUrl;
    if (d.tel) CONFIG.tel = d.tel;
    if (d.lunch) CONFIG.hours.lunch = d.lunch;
    if (d.dinner) CONFIG.hours.dinner = d.dinner;
    if (d.address) CONFIG.address = d.address;
    root.classList.add("goffee-menu");
    currentLang = readLang();
    document.documentElement.lang = currentLang;
    render();        // mostra subito i dati interni (nessuna attesa / nessun vuoto)
    loadSheet();     // se configurato, aggiorna dal Foglio Google e ri-renderizza
    // Esc chiude il foglio lingua flottante
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        var fn = root.querySelector(".fnav--open");
        if (fn) {
          fn.classList.remove("fnav--open");
          var fab = fn.querySelector(".fnav-fab");
          if (fab) fab.setAttribute("aria-expanded", "false");
        }
        var m = root.querySelector(".ord-modal.ord-open");
        if (m) m.classList.remove("ord-open");
      }
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }

  // esposto per personalizzazione/debug
  window.GoffeeMenu = {
    config: CONFIG, MENU: MENU, I18N: I18N,
    render: function () { if (root) render(); },
    parseCSV: parseCSV, applySheet: applySheet, loadSheet: loadSheet
  };
})();

</script></body></html>
