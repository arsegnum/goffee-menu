<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Goffee — Benvenuto</title>
<style>html{-webkit-text-size-adjust:100%;}body{margin:0;}
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&display=swap');
/* Goffee — Pagina "Tavolo" (QR) · stile editoriale/serif.
   Self-contained, isolato sotto .goffee-table. */
.goffee-table{
  --paper:#F4EBDD;
  --ink:#2B211C;
  --muted:#8C7E70;
  --line:#E4D8C7;
  --accent:#D6452B;
  --accent-ink:#B23A22;
  --serif:"Fraunces", Georgia, "Times New Roman", serif;
  --sans:-apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Helvetica Neue", Arial, sans-serif;
  min-height:100vh;min-height:100dvh;
  background:radial-gradient(125% 100% at 50% 0%, #FCF6EC 0%, #F4EBDD 58%, #EEE2CF 100%);
  color:var(--ink);
  font-family:var(--sans);font-size:17px;line-height:1.55;letter-spacing:-.01em;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  display:flex;flex-direction:column;
  padding:clamp(30px,8vw,64px) clamp(24px,7vw,56px);
}
.goffee-table *{box-sizing:border-box;}
.goffee-table img{max-width:100%;display:block;}
.goffee-table .gt-wrap{margin:auto;width:100%;max-width:470px;text-align:center;}

.goffee-table .gt-logo{height:clamp(48px,13vw,60px);width:auto;margin:0 auto clamp(18px,4vw,26px);}
.goffee-table .gt-eyebrow{font-family:var(--sans);font-size:.72rem;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--accent-ink);margin-bottom:14px;}

/* --- titoli serif --- */
.goffee-table .gt-h1{font-family:var(--serif);font-weight:500;font-size:clamp(2.9rem,13vw,4.3rem);line-height:.96;letter-spacing:-.02em;margin:0;color:var(--ink);}
.goffee-table .gt-h1-sub{display:block;font-family:var(--serif);font-style:italic;font-weight:500;font-size:.4em;color:var(--accent);letter-spacing:0;margin-top:.28em;}
.goffee-table .gt-h2{font-family:var(--serif);font-weight:500;font-size:clamp(2.2rem,9vw,3rem);line-height:1.02;letter-spacing:-.02em;margin:0 0 clamp(24px,5vw,32px);color:var(--ink);}

/* --- pizza ritagliata (sfondo trasparente), galleggiante --- */
.goffee-table .gt-pizza{position:relative;width:clamp(190px,54vw,260px);
  margin:clamp(22px,5vw,30px) auto clamp(20px,4vw,26px);}
.goffee-table .gt-pizza img{position:relative;z-index:1;width:100%;height:auto;display:block;
  animation:gtSpin 48s linear infinite;}
.goffee-table .gt-pizza::after{content:"";position:absolute;left:50%;bottom:1%;width:64%;height:22px;
  transform:translateX(-50%);background:radial-gradient(ellipse, rgba(90,45,25,.24), transparent 70%);
  filter:blur(6px);z-index:0;}
@keyframes gtSpin{to{transform:rotate(360deg);}}
@media(prefers-reduced-motion:reduce){.goffee-table .gt-pizza img{animation:none;}}

/* --- etichetta "scegli lingua" --- */
.goffee-table .gt-choose-label{display:flex;align-items:center;gap:14px;margin:0 0 8px;
  color:var(--muted);font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;}
.goffee-table .gt-choose-label::before,.goffee-table .gt-choose-label::after{content:"";flex:1;height:1px;background:var(--line);}

/* --- elenco lingue (stile rivista) --- */
.goffee-table .gt-langs{display:flex;flex-direction:column;}
.goffee-table .gt-lang{appearance:none;cursor:pointer;font-family:var(--sans);background:none;border:none;
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;width:100%;padding:15px 4px;text-align:left;
  transition:padding .22s cubic-bezier(.2,.7,.3,1);}
.goffee-table .gt-lang:first-child{border-top:1px solid var(--line);}
.goffee-table .gt-flag{font-size:1.32rem;line-height:1;flex:none;width:26px;text-align:center;}
.goffee-table .gt-lang-name{flex:1;font-family:var(--serif);font-size:1.34rem;font-weight:500;color:var(--ink);letter-spacing:-.01em;transition:color .18s ease;}
.goffee-table .gt-chevron{color:var(--muted);flex:none;transition:transform .2s ease, color .18s ease;}
.goffee-table .gt-lang:hover{padding-left:14px;}
.goffee-table .gt-lang:hover .gt-lang-name{color:var(--accent);}
.goffee-table .gt-lang:hover .gt-chevron{color:var(--accent);transform:translateX(4px);}

/* --- istruzioni: numeri serif --- */
.goffee-table .gt-steps{list-style:none;margin:0 0 clamp(26px,5vw,32px);padding:0;text-align:left;}
.goffee-table .gt-step{display:flex;gap:16px;align-items:baseline;padding:15px 4px;border-bottom:1px solid var(--line);}
.goffee-table .gt-step:first-child{border-top:1px solid var(--line);}
.goffee-table .gt-step-n{font-family:var(--serif);font-style:italic;font-weight:500;font-size:1.7rem;color:var(--accent);flex:none;width:30px;line-height:1;}
.goffee-table .gt-step-t{font-family:var(--sans);font-size:1.01rem;line-height:1.5;color:var(--ink);}
.goffee-table .gt-step-t b{font-weight:600;}

/* --- pulsante + cambio lingua --- */
.goffee-table .gt-btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;
  background:var(--accent);color:#fff;text-decoration:none;font-family:var(--sans);font-weight:600;font-size:1.06rem;letter-spacing:-.01em;
  padding:16px 26px;border-radius:999px;border:none;cursor:pointer;box-shadow:0 16px 32px -14px rgba(214,69,43,.6);
  transition:transform .18s cubic-bezier(.2,.7,.3,1), box-shadow .18s ease, filter .18s ease;}
.goffee-table .gt-btn:hover{transform:translateY(-2px);box-shadow:0 24px 44px -16px rgba(214,69,43,.65);filter:brightness(1.03);}
.goffee-table .gt-btn:active{transform:translateY(0);}
.goffee-table .gt-btn svg{display:block;}
.goffee-table .gt-change{display:inline-block;margin-top:16px;background:none;border:none;cursor:pointer;font-family:var(--sans);
  font-size:.9rem;color:var(--muted);padding:8px;border-radius:8px;transition:color .18s ease;}
.goffee-table .gt-change:hover{color:var(--accent);}

/* --- transizioni tra passi --- */
.goffee-table .gt-screen{animation:gtFade .34s cubic-bezier(.2,.7,.3,1);}
@keyframes gtFade{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
@media(prefers-reduced-motion:reduce){.goffee-table .gt-screen{animation:none;}}
.goffee-table[data-step="lang"] .gt-instructions{display:none;}
.goffee-table[data-step="instructions"] .gt-choose{display:none;}
</content>
</style></head><body><div id="goffee-table-root"></div><script>
/* ============================================================================
   Goffee — Pagina "Tavolo" (QR): il cliente sceglie la lingua, legge come
   ordinare (alla cassa) e apre il menù nella lingua scelta.
   Si monta in un contenitore #goffee-table-root.
   ========================================================================== */
(function () {
  "use strict";

  var CONFIG = {
    mount: "#goffee-table-root",
    menuUrl: "/menu",                 // pagina del menù (override: data-menu-url)
    logoSrc: "https://cdn.jsdelivr.net/gh/arsegnum/goffee-menu@v15/dist/goffee-logo.png",
    pizzaSrc: "https://cdn.jsdelivr.net/gh/arsegnum/goffee-menu@v15/dist/pizza-cutout.png",
    storageKey: "goffee-lang"         // stessa chiave del menù → la lingua si mantiene
  };

  var LANGS = [
    ["it", "Italiano", "🇮🇹"],
    ["en", "English", "🇬🇧"],
    ["de", "Deutsch", "🇩🇪"],
    ["fr", "Français", "🇫🇷"]
  ];

  var T = {
    place: "Dervio · Lago di Como",
    langPick: "Lingua · Language · Sprache · Langue",
    welcomeWord: { it: "Benvenuto", en: "Welcome", de: "Willkommen", fr: "Bienvenue" },
    howTitle: { it: "Come ordinare", en: "How to order", de: "So bestellst du", fr: "Comment commander" },
    steps: {
      it: [
        "Guarda con calma il nostro menù.",
        "Vieni a ordinare e pagare <b>alla cassa</b>, indicando il tuo <b>nome</b> e il <b>numero del tavolo</b>.",
        "Quando è pronto, <b>ti portiamo il cibo al tavolo</b>.",
        "Le <b>bevande</b> le ritiri direttamente tu alla cassa."
      ],
      en: [
        "Take your time to look at our menu.",
        "Come and order and pay <b>at the counter</b>, giving your <b>name</b> and <b>table number</b>.",
        "When it's ready, <b>we'll bring the food to your table</b>.",
        "<b>Drinks</b> are collected by you directly at the counter."
      ],
      de: [
        "Sieh dir in Ruhe unsere Speisekarte an.",
        "Bestelle und bezahle <b>an der Kasse</b> und nenne deinen <b>Namen</b> und die <b>Tischnummer</b>.",
        "Sobald es fertig ist, <b>bringen wir dir das Essen an den Tisch</b>.",
        "<b>Getränke</b> holst du dir direkt an der Kasse."
      ],
      fr: [
        "Prenez le temps de regarder notre menu.",
        "Venez commander et payer <b>à la caisse</b>, en indiquant votre <b>nom</b> et le <b>numéro de table</b>.",
        "Dès que c'est prêt, <b>nous apportons les plats à votre table</b>.",
        "Les <b>boissons</b> sont à récupérer directement à la caisse."
      ]
    },
    menuBtn: { it: "Vedi il menù", en: "View the menu", de: "Zur Speisekarte", fr: "Voir le menu" },
    changeLang: { it: "Cambia lingua", en: "Change language", de: "Sprache ändern", fr: "Changer de langue" }
  };

  var ARROW =
    '<svg width="19" height="19" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  var CHEVRON =
    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  function esc(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  var root, lang = "it";

  function chooseScreen() {
    var buttons = LANGS.map(function (l) {
      return '<button type="button" class="gt-lang" data-lang="' + l[0] + '">' +
        '<span class="gt-flag" aria-hidden="true">' + l[2] + '</span>' +
        '<span class="gt-lang-name">' + esc(l[1]) + '</span>' +
        '<span class="gt-chevron">' + CHEVRON + '</span></button>';
    }).join("");
    return '<div class="gt-screen gt-choose">' +
      '<div class="gt-eyebrow">' + esc(T.place) + '</div>' +
      '<h1 class="gt-h1">Benvenuto<span class="gt-h1-sub">da Goffee</span></h1>' +
      '<div class="gt-pizza"><img src="' + esc(CONFIG.pizzaSrc) + '" alt="Pizza artigianale Goffee"></div>' +
      '<div class="gt-choose-label">' + esc(T.langPick) + '</div>' +
      '<div class="gt-langs" role="group" aria-label="Lingua / Language">' + buttons + '</div>' +
      '</div>';
  }

  function instructionsScreen() {
    var steps = (T.steps[lang] || T.steps.it).map(function (s, i) {
      return '<li class="gt-step"><span class="gt-step-n">' + (i + 1) + '</span>' +
        '<span class="gt-step-t">' + s + '</span></li>';
    }).join("");
    return '<div class="gt-screen gt-instructions">' +
      '<div class="gt-eyebrow">' + esc(T.welcomeWord[lang] || T.welcomeWord.it) + '</div>' +
      '<h2 class="gt-h2">' + esc(T.howTitle[lang] || T.howTitle.it) + '</h2>' +
      '<ol class="gt-steps">' + steps + '</ol>' +
      '<a class="gt-btn" href="' + esc(CONFIG.menuUrl) + '">' + esc(T.menuBtn[lang] || T.menuBtn.it) + ' ' + ARROW + '</a>' +
      '<button type="button" class="gt-change">' + esc(T.changeLang[lang] || T.changeLang.it) + '</button>' +
      '</div>';
  }

  function render() {
    root.innerHTML =
      '<div class="gt-wrap">' +
      '<img class="gt-logo" src="' + esc(CONFIG.logoSrc) + '" alt="Goffee Pizzeria">' +
      chooseScreen() + instructionsScreen() +
      '</div>';
    wire();
  }

  function setLang(code) {
    lang = code;
    try { localStorage.setItem(CONFIG.storageKey, code); } catch (e) {}
    document.documentElement.lang = code;
    render();
    root.setAttribute("data-step", "instructions");
    try { window.scrollTo(0, 0); } catch (e) {}
  }

  function wire() {
    root.querySelectorAll(".gt-lang").forEach(function (b) {
      b.addEventListener("click", function () { setLang(b.getAttribute("data-lang")); });
    });
    var change = root.querySelector(".gt-change");
    if (change) change.addEventListener("click", function () {
      root.setAttribute("data-step", "lang");
      try { window.scrollTo(0, 0); } catch (e) {}
    });
  }

  function init() {
    root = document.querySelector(CONFIG.mount);
    if (!root) { console.error("[Goffee Tavolo] contenitore non trovato:", CONFIG.mount); return; }
    if (root.dataset && root.dataset.menuUrl) CONFIG.menuUrl = root.dataset.menuUrl;
    root.classList.add("goffee-table");
    root.setAttribute("data-step", "lang");   // si parte sempre dalla scelta lingua
    render();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }

  window.GoffeeTable = { config: CONFIG, T: T };
})();

</script></body></html>
