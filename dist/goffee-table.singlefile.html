<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Goffee — Benvenuto</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>html{-webkit-text-size-adjust:100%;}body{margin:0;}
/* Goffee — Pagina "Tavolo" (QR): scelta lingua → istruzioni → menù.
   Self-contained, isolato sotto .goffee-table. */
.goffee-table{
  --white:#FFFFFF;
  --ice:#FAFAFA;
  --ink:#1D1D1F;
  --muted:#6E6E73;
  --line:#ECECEC;
  --accent:#D6452B;
  --font:-apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", "Helvetica Neue", Arial, sans-serif;
  --pad:clamp(22px, 6vw, 40px);
  min-height:100vh;background:var(--ice);color:var(--ink);
  font-family:var(--font);font-size:17px;line-height:1.55;letter-spacing:-.01em;
  -webkit-font-smoothing:antialiased;
  display:flex;align-items:flex-start;justify-content:center;padding:clamp(28px,8vw,64px) var(--pad);
}
.goffee-table *{box-sizing:border-box;}
.goffee-table img{max-width:100%;display:block;}

.goffee-table .gt-wrap{width:100%;max-width:520px;text-align:center;}
.goffee-table .gt-logo{height:46px;width:auto;margin:0 auto clamp(24px,5vw,34px);}

.goffee-table .gt-h1{font-weight:700;font-size:clamp(1.9rem,6.5vw,2.7rem);line-height:1.05;letter-spacing:-.035em;margin:0 0 .35em;color:var(--ink);text-wrap:balance;}
.goffee-table .gt-sub{color:var(--muted);font-size:.98rem;line-height:1.5;margin:0 auto clamp(26px,5vw,34px);max-width:34ch;text-wrap:pretty;}

/* --- scelta lingua --- */
.goffee-table .gt-langs{display:flex;flex-direction:column;gap:12px;}
.goffee-table .gt-lang{
  appearance:none;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:14px;width:100%;
  background:var(--white);border:1px solid var(--line);border-radius:16px;
  padding:16px 18px;font-size:1.12rem;font-weight:500;color:var(--ink);letter-spacing:-.01em;
  box-shadow:0 1px 2px rgba(0,0,0,.03);
  transition:transform .15s cubic-bezier(.2,.7,.3,1), border-color .18s ease, box-shadow .18s ease;
}
.goffee-table .gt-lang:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 10px 24px -16px rgba(0,0,0,.25);}
.goffee-table .gt-lang:active{transform:translateY(0);}
.goffee-table .gt-flag{font-size:1.5rem;line-height:1;flex:none;}
.goffee-table .gt-lang b{font-weight:500;flex:1;text-align:left;}
.goffee-table .gt-chevron{color:var(--muted);flex:none;}

/* --- istruzioni --- */
.goffee-table .gt-steps{list-style:none;margin:0 0 clamp(28px,5vw,36px);padding:0;display:flex;flex-direction:column;gap:2px;text-align:left;}
.goffee-table .gt-step{display:flex;align-items:flex-start;gap:15px;padding:15px 4px;border-bottom:1px solid var(--line);}
.goffee-table .gt-step:last-child{border-bottom:none;}
.goffee-table .gt-step-n{flex:none;width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;
  font-size:.98rem;font-weight:600;display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums;}
.goffee-table .gt-step-t{font-size:1.04rem;line-height:1.45;color:var(--ink);padding-top:2px;}
.goffee-table .gt-step-t b{font-weight:600;}

.goffee-table .gt-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;width:100%;
  background:var(--accent);color:#fff;text-decoration:none;
  font-family:inherit;font-weight:600;font-size:1.08rem;letter-spacing:-.01em;
  padding:17px 28px;border-radius:980px;border:none;cursor:pointer;
  transition:filter .18s ease, transform .18s cubic-bezier(.2,.7,.3,1);
}
.goffee-table .gt-btn:hover{filter:brightness(1.06);transform:translateY(-1px);}
.goffee-table .gt-btn:active{transform:translateY(0);}
.goffee-table .gt-btn svg{display:block;}
.goffee-table .gt-change{display:inline-block;margin-top:18px;background:none;border:none;cursor:pointer;
  font-family:inherit;font-size:.92rem;color:var(--muted);text-decoration:underline;text-underline-offset:3px;padding:6px;}
.goffee-table .gt-change:hover{color:var(--ink);}

/* --- passi di visibilità --- */
.goffee-table .gt-screen{animation:gtFade .25s ease;}
@keyframes gtFade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.goffee-table[data-step="lang"] .gt-instructions{display:none;}
.goffee-table[data-step="instructions"] .gt-choose{display:none;}
</content>
</style>
</head>
<body>
<div id="goffee-table-root"></div>
<script>
/* ============================================================================
   Goffee — Pagina "Tavolo" (QR): il cliente sceglie la lingua, legge come
   ordinare (alla cassa) e apre il menù nella lingua scelta.
   Si monta in un contenitore #goffee-table-root.
   ========================================================================== */
(function () {
  "use strict";

  var CONFIG = {
    mount: "#goffee-table-root",
    menuUrl: "/menu",                 // pagina del menù (override: data-menu-url)
    logoSrc: "https://cdn.jsdelivr.net/gh/arsegnum/goffee-menu@v11/dist/goffee-logo.png",
    storageKey: "goffee-lang"         // stessa chiave del menù → la lingua si mantiene
  };

  var LANGS = [
    ["it", "Italiano", "🇮🇹"],
    ["en", "English", "🇬🇧"],
    ["de", "Deutsch", "🇩🇪"],
    ["fr", "Français", "🇫🇷"]
  ];

  var T = {
    brandWelcome: "Benvenuto da Goffee",
    chooseLang: "Scegli la lingua · Choose your language · Sprache wählen · Choisir la langue",
    howTitle: { it: "Come ordinare", en: "How to order", de: "So bestellst du", fr: "Comment commander" },
    steps: {
      it: [
        "Guarda con calma il nostro menù.",
        "Vieni a ordinare e pagare <b>alla cassa</b>, indicando il tuo <b>nome</b> e il <b>numero del tavolo</b>.",
        "Quando è pronto, <b>ti portiamo il cibo al tavolo</b>.",
        "Le <b>bevande</b> le ritiri direttamente tu alla cassa."
      ],
      en: [
        "Take your time to look at our menu.",
        "Come and order and pay <b>at the counter</b>, giving your <b>name</b> and <b>table number</b>.",
        "When it's ready, <b>we'll bring the food to your table</b>.",
        "<b>Drinks</b> are collected by you directly at the counter."
      ],
      de: [
        "Sieh dir in Ruhe unsere Speisekarte an.",
        "Bestelle und bezahle <b>an der Kasse</b> und nenne deinen <b>Namen</b> und die <b>Tischnummer</b>.",
        "Sobald es fertig ist, <b>bringen wir dir das Essen an den Tisch</b>.",
        "<b>Getränke</b> holst du dir direkt an der Kasse."
      ],
      fr: [
        "Prenez le temps de regarder notre menu.",
        "Venez commander et payer <b>à la caisse</b>, en indiquant votre <b>nom</b> et le <b>numéro de table</b>.",
        "Dès que c'est prêt, <b>nous apportons les plats à votre table</b>.",
        "Les <b>boissons</b> sont à récupérer directement à la caisse."
      ]
    },
    menuBtn: { it: "Vedi il menù", en: "View the menu", de: "Zur Speisekarte", fr: "Voir le menu" },
    changeLang: { it: "Cambia lingua", en: "Change language", de: "Sprache ändern", fr: "Changer de langue" }
  };

  var ARROW =
    '<svg width="19" height="19" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  var CHEVRON =
    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  function esc(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  var root, lang = "it";

  function chooseScreen() {
    var buttons = LANGS.map(function (l) {
      return '<button type="button" class="gt-lang" data-lang="' + l[0] + '">' +
        '<span class="gt-flag" aria-hidden="true">' + l[2] + '</span>' +
        '<b>' + esc(l[1]) + '</b><span class="gt-chevron">' + CHEVRON + '</span></button>';
    }).join("");
    return '<div class="gt-screen gt-choose">' +
      '<h1 class="gt-h1">' + esc(T.brandWelcome) + '</h1>' +
      '<p class="gt-sub">' + esc(T.chooseLang) + '</p>' +
      '<div class="gt-langs" role="group" aria-label="Lingua / Language">' + buttons + '</div>' +
      '</div>';
  }

  function instructionsScreen() {
    var steps = (T.steps[lang] || T.steps.it).map(function (s, i) {
      return '<li class="gt-step"><span class="gt-step-n">' + (i + 1) + '</span>' +
        '<span class="gt-step-t">' + s + '</span></li>';
    }).join("");
    return '<div class="gt-screen gt-instructions">' +
      '<h1 class="gt-h1">' + esc(T.howTitle[lang] || T.howTitle.it) + '</h1>' +
      '<ol class="gt-steps">' + steps + '</ol>' +
      '<a class="gt-btn" href="' + esc(CONFIG.menuUrl) + '">' + esc(T.menuBtn[lang] || T.menuBtn.it) + ' ' + ARROW + '</a>' +
      '<button type="button" class="gt-change">' + esc(T.changeLang[lang] || T.changeLang.it) + '</button>' +
      '</div>';
  }

  function render() {
    root.innerHTML =
      '<div class="gt-wrap">' +
      '<img class="gt-logo" src="' + esc(CONFIG.logoSrc) + '" alt="Goffee Pizzeria">' +
      chooseScreen() + instructionsScreen() +
      '</div>';
    wire();
  }

  function setLang(code) {
    lang = code;
    try { localStorage.setItem(CONFIG.storageKey, code); } catch (e) {}
    document.documentElement.lang = code;
    render();
    root.setAttribute("data-step", "instructions");
    try { window.scrollTo(0, 0); } catch (e) {}
  }

  function wire() {
    root.querySelectorAll(".gt-lang").forEach(function (b) {
      b.addEventListener("click", function () { setLang(b.getAttribute("data-lang")); });
    });
    var change = root.querySelector(".gt-change");
    if (change) change.addEventListener("click", function () {
      root.setAttribute("data-step", "lang");
      try { window.scrollTo(0, 0); } catch (e) {}
    });
  }

  function init() {
    root = document.querySelector(CONFIG.mount);
    if (!root) { console.error("[Goffee Tavolo] contenitore non trovato:", CONFIG.mount); return; }
    if (root.dataset && root.dataset.menuUrl) CONFIG.menuUrl = root.dataset.menuUrl;
    root.classList.add("goffee-table");
    root.setAttribute("data-step", "lang");   // si parte sempre dalla scelta lingua
    render();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }

  window.GoffeeTable = { config: CONFIG, T: T };
})();

</script>
</body>
</html>
