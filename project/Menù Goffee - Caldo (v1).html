<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Menù — Goffee · Pizzeria artigianale, Dervio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Playfair+Display:wght@500;600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#FBF7F0;
  --card:#FFFDF8;
  --border:#E8E0D2;
  --hair:color-mix(in srgb, #E8E0D2 55%, transparent);
  --ink:#34251A;
  --ink-soft:#5C4A39;
  --muted:#8A7A67;
  --accent:#C0612F;
  --ochre:#E0B87A;
  --footbg:#2C1F15;
  --font-title:'Fraunces', Georgia, serif;
  --font-body:'Work Sans', system-ui, sans-serif;
  --maxw:1120px;
  --pad:clamp(20px, 6vw, 56px);
  --shadow-card:0 1px 2px rgba(52,37,26,.03), 0 22px 48px -34px rgba(52,37,26,.45);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{
  margin:0;background:var(--bg);color:var(--ink);
  font-family:var(--font-body);font-size:17px;line-height:1.6;
  font-weight:400;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
}
.page{min-height:100vh;}
section[id], header[id]{scroll-margin-top:80px;}
strong{font-weight:600;}

/* ---------- NAV ---------- */
.chips{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;gap:18px;
  padding:13px var(--pad);
  background:color-mix(in srgb, var(--bg) 78%, transparent);
  backdrop-filter:saturate(140%) blur(16px);
  -webkit-backdrop-filter:saturate(140%) blur(16px);
  border-bottom:1px solid var(--hair);
}
.chips-brand{
  font-family:var(--font-title);font-weight:600;font-size:1.22rem;
  letter-spacing:-.01em;color:var(--ink);flex:none;line-height:1;
}
.chips-scroll{
  display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;flex:1;
  -webkit-overflow-scrolling:touch;
}
.chips-scroll::-webkit-scrollbar{display:none;}
.chip{
  flex:none;text-decoration:none;white-space:nowrap;
  font-size:.9rem;font-weight:500;color:var(--muted);
  padding:7px 13px;border-radius:999px;
  transition:color .2s ease, background .2s ease;
}
.chip:hover{color:var(--ink);}
.chip--active{color:var(--ink);font-weight:600;background:color-mix(in srgb,var(--ochre) 22%, transparent);}
.nav-cta{flex:none;}
.nav-cta .btn{padding:9px 18px;font-size:.88rem;}
@media(max-width:780px){.nav-cta{display:none;}}

/* ---------- BUTTON ---------- */
.btn{
  display:inline-flex;align-items:center;gap:9px;
  background:var(--accent);color:#fff;text-decoration:none;
  font-family:var(--font-body);font-weight:500;font-size:1rem;
  padding:14px 26px;border-radius:980px;letter-spacing:.005em;
  box-shadow:0 10px 26px -14px color-mix(in srgb, var(--accent) 75%, #000);
  transition:transform .18s cubic-bezier(.2,.7,.3,1), filter .18s ease, box-shadow .18s ease;
}
.btn strong{font-weight:600;}
.btn--big{font-size:1.06rem;padding:17px 32px;}
.btn:hover{transform:translateY(-1.5px);filter:brightness(1.04);box-shadow:0 16px 30px -16px color-mix(in srgb,var(--accent) 75%, #000);}
.btn:active{transform:translateY(0);}

/* ---------- HERO ---------- */
.hero{padding:clamp(64px,13vh,148px) var(--pad) clamp(40px,7vw,72px);}
.hero-inner{max-width:var(--maxw);margin:0 auto;}
.eyebrow{
  display:inline-block;font-size:.8rem;font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;color:var(--accent);
}
.hero-place{display:inline;color:var(--muted);}
.hero-title{
  font-family:var(--font-title);font-weight:540;
  font-size:clamp(4rem,15vw,8.5rem);line-height:.9;
  margin:.16em 0 .24em;letter-spacing:-.025em;color:var(--ink);
  font-variation-settings:"opsz" 144;
}
.hero-sub{
  max-width:36ch;margin:0 0 2em;color:var(--ink-soft);
  font-size:clamp(1.08rem,2.6vw,1.32rem);line-height:1.55;font-weight:400;text-wrap:pretty;
}
.hero[data-variant="centrato"]{text-align:center;}
.hero[data-variant="centrato"] .hero-sub{margin-left:auto;margin-right:auto;}
.hero[data-variant="editoriale"] .hero-title{font-size:clamp(4.2rem,17vw,9.5rem);}
.hero[data-variant="editoriale"] .hero-title::after{
  content:"";display:block;width:96px;height:3px;border-radius:3px;
  background:var(--ochre);margin-top:.26em;
}
.hero[data-variant="foto"] .hero-inner{
  display:grid;grid-template-columns:1.02fr .98fr;gap:clamp(28px,5vw,64px);align-items:center;
}
.hero-photo{
  align-self:stretch;min-height:340px;border-radius:24px;overflow:hidden;
  background:
    radial-gradient(120% 90% at 70% 18%, color-mix(in srgb,var(--ochre) 52%, var(--card)) 0%, transparent 62%),
    repeating-linear-gradient(135deg, color-mix(in srgb,var(--ochre) 20%, var(--card)) 0 14px, color-mix(in srgb,var(--ochre) 12%, var(--card)) 14px 28px);
  border:1px solid var(--hair);
  display:flex;align-items:flex-end;padding:18px;
}
.photo-tag{
  font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
  background:color-mix(in srgb,var(--card) 82%, transparent);
  padding:6px 11px;border-radius:980px;border:1px solid var(--hair);
}
@media(max-width:760px){
  .hero[data-variant="foto"] .hero-inner{grid-template-columns:1fr;}
  .hero[data-variant="foto"] .hero-photo{min-height:220px;order:-1;}
}

/* ---------- WRAP ---------- */
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--pad) clamp(48px,8vw,88px);}

/* ---------- ALLERGENI ---------- */
.allerg-box{
  margin:4px 0 clamp(56px,9vw,96px);padding:22px 0;
  border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);
}
.allerg-intro{
  margin:0 0 14px;font-size:.8rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);
}
.allerg-legend{
  list-style:none;margin:0;padding:0;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px 20px;
}
.allerg-legend li{font-size:.84rem;color:var(--ink-soft);display:flex;align-items:center;gap:8px;}
.allerg-legend b{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:20px;height:20px;padding:0 5px;flex:none;
  font-size:.7rem;font-weight:700;color:var(--accent);
  background:color-mix(in srgb,var(--ochre) 26%, var(--card));border-radius:7px;
}

/* ---------- SECTION ---------- */
.section{margin-bottom:clamp(64px,11vw,128px);}
.sec-head{margin-bottom:clamp(28px,4vw,44px);max-width:62ch;}
.sec-kicker{
  display:block;font-size:.78rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
  color:var(--accent);margin-bottom:12px;
}
.sec-title{
  font-family:var(--font-title);font-weight:560;
  font-size:clamp(2.1rem,5.5vw,3.4rem);line-height:1.02;margin:0;color:var(--ink);
  letter-spacing:-.018em;font-variation-settings:"opsz" 72;
}
.sec-note{margin:16px 0 0;color:var(--ink-soft);max-width:58ch;font-size:1.04rem;line-height:1.6;text-wrap:pretty;}
.deco{display:block;margin-top:18px;color:var(--ochre);}
.deco--line{width:56px;height:2px;border-radius:3px;background:var(--ochre);}
.deco--dots{display:flex;gap:7px;}
.deco--dots i{width:6px;height:6px;border-radius:50%;background:var(--ochre);}

/* ---------- MENU GRID ---------- */
.menu-grid{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:760px){.menu-grid{grid-template-columns:1fr 1fr;gap:16px 32px;}}

.dish{transition:transform .2s cubic-bezier(.2,.7,.3,1), box-shadow .2s ease;}
.dish-head{display:flex;justify-content:space-between;align-items:baseline;gap:16px;}
.dish-name{
  font-family:var(--font-body);font-weight:600;font-size:1.08rem;
  margin:0;color:var(--ink);line-height:1.3;letter-spacing:-.003em;
}
.allerg{margin-left:6px;color:var(--muted);font-weight:400;}
.allerg sup{font-size:.6em;margin:0 .5px;font-weight:500;}
.price{
  color:var(--accent);font-weight:600;font-size:1.05rem;
  font-variant-numeric:tabular-nums;white-space:nowrap;flex:none;letter-spacing:-.01em;
}
.desc{margin:7px 0 0;color:var(--muted);font-size:.96rem;line-height:1.55;text-wrap:pretty;}

/* card variants */
.page[data-card="bordo"] .dish{
  background:var(--card);border:1px solid var(--hair);border-radius:20px;padding:22px 24px;
  box-shadow:0 1px 2px rgba(52,37,26,.025);
}
.page[data-card="bordo"] .dish:hover{transform:translateY(-3px);box-shadow:var(--shadow-card);}
.page[data-card="rilievo"] .dish{
  background:var(--card);border-radius:20px;padding:22px 24px;box-shadow:var(--shadow-card);
}
.page[data-card="rilievo"] .dish:hover{transform:translateY(-3px);box-shadow:0 1px 2px rgba(52,37,26,.04), 0 30px 56px -34px rgba(52,37,26,.55);}
.page[data-card="piatto"] .dish{padding:18px 2px 19px;border-bottom:1px solid var(--hair);border-radius:0;}
.page[data-card="piatto"] .menu-grid{gap:0 36px;}

/* ---------- DRINKS ---------- */
.drinks{display:grid;grid-template-columns:1fr;gap:clamp(32px,5vw,56px);}
@media(min-width:760px){.drinks{grid-template-columns:1fr 1fr;}}
.drink-list{list-style:none;margin:0;padding:0;}
.drink-list li{display:flex;align-items:baseline;gap:10px;padding:11px 0;border-bottom:1px solid var(--hair);}
.drink-name{color:var(--ink);font-weight:500;font-size:1.02rem;}
.dotfill{flex:1;border-bottom:1.5px dotted color-mix(in srgb,var(--muted) 40%, transparent);transform:translateY(-4px);}
.beer-title{
  font-family:var(--font-title);font-weight:560;font-size:1.22rem;color:var(--ink);margin:0 0 10px;letter-spacing:-.01em;
}

/* ---------- FOOTER ---------- */
.foot{background:var(--footbg);color:#F1E7D8;padding:clamp(64px,11vw,116px) var(--pad);}
.foot-inner{max-width:var(--maxw);margin:0 auto;text-align:center;}
.foot-eyebrow{display:block;font-size:.78rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ochre);margin-bottom:18px;}
.foot-title{font-family:var(--font-title);font-weight:560;font-size:clamp(2.3rem,7vw,3.8rem);margin:0 0 .26em;color:#fff;letter-spacing:-.02em;line-height:1;}
.foot-addr{color:#CDBBA3;margin:0 0 2.2em;font-size:1.08rem;}
.foot-hours{display:flex;flex-wrap:wrap;justify-content:center;gap:18px 48px;margin-bottom:2.6em;}
.foot-hours div{display:flex;flex-direction:column;gap:5px;}
.foot-hours span{font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;color:#A98E70;}
.foot-hours b{font-size:1.1rem;color:#F1E7D8;font-weight:600;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="menu-data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="menu-app-v1.jsx"></script>
</body>
</html>
